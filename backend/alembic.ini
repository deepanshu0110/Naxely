[alembic]
script_location = migrations
prepend_sys_path = .

# SQLAlchemy async URL — reads from env
sqlalchemy.url = postgresql+asyncpg://%(SUPABASE_DB_USER)s:%(SUPABASE_DB_PASSWORD)s@%(SUPABASE_DB_HOST)s:%(SUPABASE_DB_PORT)s/%(SUPABASE_DB_NAME)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
