services:
  - type: web
    name: naxely-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: MASTER_ENCRYPTION_KEY
        sync: false
      - key: DODO_API_KEY
        sync: false
      - key: DODO_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGINS
        value: https://naxely.io,https://www.naxely.io
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: DODO_PRO_PRODUCT_ID
        sync: false
      - key: DODO_AGENCY_PRODUCT_ID
        sync: false
      - key: FROM_EMAIL
        value: hello@naxely.io
      - key: TEMP_DIR
        value: /tmp/naxely
      - key: SUPABASE_DB_HOST
        sync: false
      - key: SUPABASE_DB_PORT
        value: 5432
      - key: SUPABASE_DB_NAME
        sync: false
      - key: SUPABASE_DB_USER
        sync: false
      - key: SUPABASE_DB_PASSWORD
        sync: false
