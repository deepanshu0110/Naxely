  <script type="application/ld+json">

    "@context": "https://schema.org",

    "offers": {
      "@type": "AggregateOffer",
      "lowPrice": "0",

    }
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      {
        "@type": "ListItem",
        "position": 1,
        "name": "Home",
        "item": "https://naxely.com/"
      }
    ]
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "What is Naxely?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Naxely is an AI-powered PDF report generator that turns CSV files and Google Sheets into branded, professional PDF reports with AI-written insights, charts, and tables."
        }
      },
      {
        "@type": "Question",
        "name": "How does Naxely work?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Upload a CSV file or connect a Google Sheet, configure charts and branding (colors, logo, fonts), and click generate. Naxely creates a polished PDF report with AI-written analysis, visualizations, and a custom cover page."
        }
      },
      {
        "@type": "Question",
        "name": "Do I need my own AI API key to use Naxely?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "No. The Free tier includes shared AI credits. Pro and Agency subscribers can bring their own API key (BYOK) for Groq, OpenAI, Gemini, Claude, DeepSeek, Mistral, or Together AI — or use the included AI credits."
        }
      },
      {
        "@type": "Question",
        "name": "Can I customize the design of my PDF reports?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. You can add your logo, choose brand colors, select fonts from the Fraunces and IBM Plex families, write a custom cover letter, and control which charts and data tables appear in the report."
        }
      },
      {
        "@type": "Question",
        "name": "What data sources does Naxely support?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Naxely supports CSV file uploads, Google Sheets integration (read-only, with your authorization), and typed column detection for proper chart rendering."
        }
      }
    ]
  }
  </script>
